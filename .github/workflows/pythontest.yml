name: Python tests
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  pre_job:
    name: Path match check
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          github_token: ${{ github.token }}
          paths: '["**.py", ".github/workflows/pythontest.yml", "pyproject.toml", "uv.lock"]'
  unit_test:
    name: Python unit tests
    needs: pre_job
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
        with:
          fetch-depth: 0
      - name: Set up uv
        if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-python: true
      - name: Run tests
        if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
        run: uv run --python ${{ matrix.python-version }} --group test pytest
  unit_test_eol_python:
    name: Python unit tests for EOL Python versions
    needs: pre_job
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: [3.6, 3.7, 3.8]
    container:
      image: python:${{ matrix.python-version }}-buster
    steps:
      - uses: actions/checkout@v6
        if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
      - name: Install dependencies and run tests
        if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install "pytest>=6.2.5,<8" "jsonschema==3.2.0"
          pytest
